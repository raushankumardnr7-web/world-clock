<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🌍 World Clock</h1>

  <input
    type="text"
    id="country"
    placeholder="Enter Country (India, USA, Japan...)"
  >

  <button onclick="showTime()">Get Time</button>

  <div class="result">
    <h2 id="location"></h2>
    <h1 id="time"></h1>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
